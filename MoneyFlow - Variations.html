<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>MoneyFlow — Direcții vizuale</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Geist:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations.jsx"></script>

<script type="text/babel">
function VarsApp() {
  const variants = [
    {
      id: 'classic',
      label: 'V1 · Classic Fintech',
      note: 'Paletă PRD originală. Gradient adânc (#1A3C5E → #2563EB), verde pentru pozitiv, alb pentru carduri. Sigur, încredere, "bancar". RECOMANDAT pentru MVP.',
      Comp: DashV1_Classic,
    },
    {
      id: 'warm',
      label: 'V2 · Warm Daylight',
      note: 'Cremă + terracotta + olive. Mai cald, mai apropiat, mai puțin "corporate". Bun pentru un produs care vrea să se simtă personal, nu instituțional.',
      Comp: DashV2_Warm,
    },
    {
      id: 'midnight',
      label: 'V3 · Midnight Glass',
      note: 'Dark-first cu accente neon (teal + violet). Gradient mesh + glass. Tech-forward, atractiv pentru un public 25-35. Mai puțin "trust-building" decât V1.',
      Comp: DashV3_Midnight,
    },
    {
      id: 'editorial',
      label: 'V4 · Editorial Banking',
      note: 'Tipografic, fără culoare, IBM Plex Mono pentru numere. Reference: extras de cont, ziar financiar. Pentru cineva care vrea date, nu emoji.',
      Comp: DashV4_Editorial,
    },
  ];

  return (
    <DesignCanvas>
      <DCSection id="dashboards" title="Dashboard — 4 direcții vizuale" subtitle="Compară side-by-side. Click pe o carte pentru fullscreen. Drag pentru reordonare." gap={56}>
        {variants.map(v => (
          <DCArtboard key={v.id} id={v.id} label={v.label} width={390} height={844}>
            <v.Comp/>
          </DCArtboard>
        ))}
      </DCSection>

      <DCPostIt top={120} left={60} rotate={-3} width={220}>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>Cum citești canvas-ul</div>
        <div style={{ fontSize: 12, lineHeight: 1.5 }}>
          Toate 4 sunt același ecran (Dashboard), doar paleta + tipografia + densitatea diferă. Click pe oricare → fullscreen.
        </div>
      </DCPostIt>

      <DCPostIt top={500} left={60} rotate={2} width={220}>
        <div style={{ fontWeight: 700, marginBottom: 6 }}>Recomandare</div>
        <div style={{ fontSize: 12, lineHeight: 1.5 }}>
          Începe cu V1 pentru MVP (corespunde PRD-ului). V3 e candidatul pentru un "Dark mode" în Faza 3.
        </div>
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VarsApp/>);
</script>
</body>
</html>
